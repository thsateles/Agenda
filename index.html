<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda — Fim de Semestre</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f0; color: #1a1a18; min-height: 100vh; padding: 1.5rem 1rem; }
  .container { max-width: 680px; margin: 0 auto; }
  h1 { font-size: 18px; font-weight: 500; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #888780; margin-bottom: 1rem; }
  .progress-bar-track { height: 6px; background: #e0dfd8; border-radius: 99px; margin-bottom: 1.5rem; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: #1D9E75; border-radius: 99px; transition: width 0.3s; }
  .header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.4rem; }
  .prog-label { font-size: 13px; color: #888780; }
  .section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #b4b2a9; margin: 1.2rem 0 6px; }
  .item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; border: 0.5px solid #d3d1c7; background: #fff; margin-bottom: 8px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .item:active { background: #f1efe8; }
  .item.done { opacity: 0.4; }
  .item.done .item-text { text-decoration: line-through; }
  .check-btn { flex-shrink: 0; width: 24px; height: 24px; border-radius: 50%; border: 1.5px solid #b4b2a9; background: transparent; display: flex; align-items: center; justify-content: center; font-size: 14px; color: transparent; transition: all 0.15s; }
  .check-btn.checked { background: #1D9E75; border-color: #1D9E75; color: #fff; }
  .item-body { flex: 1; min-width: 0; }
  .item-text { font-size: 14px; line-height: 1.45; }
  .item-sub { font-size: 12px; color: #888780; margin-top: 2px; }
  .date-badge { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; min-width: 50px; padding: 5px 8px; border-radius: 8px; text-align: center; }
  .date-badge .d-num { font-size: 13px; font-weight: 600; line-height: 1.2; }
  .date-badge .d-week { font-size: 10px; margin-top: 2px; opacity: 0.8; }
  .day-seg { background: #ddeeff; color: #185FA5; }
  .day-ter { background: #eeedfe; color: #3C3489; }
  .day-qua { background: #e6f2d8; color: #3B6D11; }
  .day-qui { background: #fef0d6; color: #854F0B; }
  .day-sex { background: #fde8e0; color: #993C1D; }
  .day-sab { background: #fce8f2; color: #72243E; }
  .day-dom { background: #fce8e8; color: #791F1F; }
  .day-none { background: #f1efe8; color: #888780; }
  .sync-bar { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 1rem; padding: 8px 12px; border-radius: 8px; background: #fff; border: 0.5px solid #d3d1c7; font-size: 13px; color: #888780; }
  .sync-left { display: flex; align-items: center; gap: 8px; }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #b4b2a9; flex-shrink: 0; }
  .sync-dot.saving { background: #EF9F27; }
  .sync-dot.saved { background: #1D9E75; }
  .sync-dot.error { background: #E24B4A; }
  .copy-btn { font-size: 12px; padding: 4px 10px; border-radius: 6px; border: 0.5px solid #d3d1c7; background: #f1efe8; color: #444; cursor: pointer; white-space: nowrap; }
  .copy-btn:active { background: #e0dfd8; }
</style>
</head>
<body>
<div class="container">
  <div class="header-row">
    <h1>Agenda — Fim de Semestre</h1>
    <span class="prog-label" id="prog-label">0 / 19 concluídos</span>
  </div>
  <div class="subtitle">Toque em um item para marcar como concluído</div>
  <div class="sync-bar">
    <div class="sync-left">
      <div class="sync-dot saved" id="sync-dot"></div>
      <span id="sync-text">Salvo localmente</span>
    </div>
    <button class="copy-btn" onclick="copyLink()">📋 Copiar link com progresso</button>
  </div>
  <div class="progress-bar-track"><div class="progress-bar-fill" id="prog-bar" style="width:0%"></div></div>
  <div id="list"></div>
</div>
<script>
var STORAGE_KEY = 'agenda_semestre_2026';
var items = [
  { date: "16/06", text: "Examen Final de Caso Clínico", sub: "Semiología cardíaca", cat: "Junho" },
  { date: "17/06", text: "Examen práctico de Anatomía", sub: "MMSS y MMII", cat: "Junho" },
  { date: "17/06", text: "Presentación de Anatomía — Caso clínico", sub: "Síndrome del simpático cervical posterior", cat: "Junho" },
  { date: "18/06", text: "Feria Embriología", sub: "Tema: vaper", cat: "Junho" },
  { date: "18/06", text: "Presentación trabajo de Histología", sub: "Sistema reproductor femenino y masculino + caso clínico", cat: "Junho" },
  { date: "20/06", text: "Examen Final práctico Anatomía", sub: "Todo lo avanzado", cat: "Junho" },
  { date: "22/06", text: "Examen Práctico final de Histología", sub: "Todo lo avanzado", cat: "Junho" },
  { date: "22/06", text: "Presentar guía Histología", sub: "Hasta urinario con placa + toda la guía teórica", cat: "Junho" },
  { date: "23/06", text: "Examen Final oral y teórico Salud Pública", sub: "Todo lo que está en plataforma", cat: "Junho" },
  { date: "25/06", text: "Examen Teórico Final Histología", sub: "Todo lo avanzado", cat: "Junho" },
  { date: "26/06", text: "Presentación portafolio Histología", sub: "Todos los temas", cat: "Junho" },
  { date: "29/06", text: "Examen Final práctico Embriología", sub: "Todo lo avanzado", cat: "Junho" },
  { date: "01/07", text: "Examen final teórico Anatomía", sub: "Todo lo avanzado", cat: "Julho" },
  { date: "02/07", text: "Presentación monografía Anatomía", sub: "Mirar el trabajo y hacer un guión", cat: "Julho" },
  { date: null, text: "Presentación Monografía", sub: "SAP, Salud Mental y Bioquímica", cat: "Sem data" },
  { date: null, text: "S.A.P — Presentar horas sociales", sub: "", cat: "Sem data" },
  { date: null, text: "Salud Mental — Examen Final", sub: "", cat: "Sem data" },
  { date: null, text: "Bioquímica — Examen Final Teórico", sub: "Buscar fecha", cat: "Sem data" },
  { date: null, text: "Inglés — Examen Final Teórico", sub: "Buscar fecha", cat: "Sem data" }
];
var weekClass = ['day-dom','day-seg','day-ter','day-qua','day-qui','day-sex','day-sab'];
var weekLabel = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

function getDateInfo(s) {
  if (!s) return null;
  var p = s.split('/'); var dt = new Date(2026, parseInt(p[1])-1, parseInt(p[0]));
  var wd = dt.getDay(); return { cls: weekClass[wd], label: weekLabel[wd] };
}

// Load state: prefer URL hash, then localStorage
var state = {};
function loadState() {
  var hash = window.location.hash.slice(1);
  if (hash) {
    try {
      state = JSON.parse(atob(hash));
      // persist to localStorage too
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e){}
      // clean URL without losing page
      history.replaceState(null, '', window.location.pathname);
      return;
    } catch(e) {}
  }
  try { state = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) { state = {}; }
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e){}
}

function copyLink() {
  var encoded = btoa(JSON.stringify(state));
  var url = window.location.origin + window.location.pathname + '#' + encoded;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(url).then(function() {
      document.getElementById('sync-text').textContent = 'Link copiado! ✓';
      setTimeout(function(){ document.getElementById('sync-text').textContent = 'Salvo localmente'; }, 2500);
    });
  } else {
    // fallback for older iOS
    var ta = document.createElement('textarea');
    ta.value = url; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    document.getElementById('sync-text').textContent = 'Link copiado! ✓';
    setTimeout(function(){ document.getElementById('sync-text').textContent = 'Salvo localmente'; }, 2500);
  }
}

loadState();

var listEl = document.getElementById('list');
function renderList() {
  listEl.innerHTML = ''; var lastCat = null;
  for (var i = 0; i < items.length; i++) {
    (function(idx) {
      var item = items[idx];
      if (item.cat !== lastCat) {
        var sec = document.createElement('div'); sec.className = 'section-label';
        sec.textContent = item.cat; listEl.appendChild(sec); lastCat = item.cat;
      }
      var info = getDateInfo(item.date);
      var div = document.createElement('div'); div.className = 'item' + (state[idx] ? ' done' : '');
      var badge = info
        ? '<div class="date-badge ' + info.cls + '"><span class="d-num">' + item.date + '</span><span class="d-week">' + info.label + '</span></div>'
        : '<div class="date-badge day-none"><span class="d-num">—</span><span class="d-week">s/data</span></div>';
      div.innerHTML = '<div class="check-btn' + (state[idx] ? ' checked' : '') + '">✓</div><div class="item-body"><div class="item-text">' + item.text + '</div>' + (item.sub ? '<div class="item-sub">' + item.sub + '</div>' : '') + '</div>' + badge;
      div.addEventListener('click', function() {
        state[idx] = !state[idx];
        div.classList.toggle('done', state[idx]);
        div.querySelector('.check-btn').classList.toggle('checked', state[idx]);
        updateProgress(); saveState();
      });
      listEl.appendChild(div);
    })(i);
  }
}

function updateProgress() {
  var done = 0; for (var k in state) { if (state[k]) done++; }
  var pct = Math.round(done / items.length * 100);
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('prog-label').textContent = done + ' / ' + items.length + ' concluídos';
}

renderList();
updateProgress();
</script>
</body>
</html>
